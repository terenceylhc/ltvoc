<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 高頻單字 U24 記憶卡</title>
    <style>
        :root {
            --primary-bg: #FFFFFF;
            --card-front-bg: #FFFFFF;
            --card-back-bg: #1A1A2E;
            --text-main: #1A1A2E;
            --text-light: #FFFFFF;
            --accent-color: #00D2FF; /* 電能青 */
            --shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-main);
            letter-spacing: 2px;
        }

        .grid-container {
            display: grid;
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        /* Responsive Layout: 1 col on mobile, 2 cols on desktop */
        @media (min-width: 769px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }

        /* Card Setup */
        .card-container {
            perspective: 1000px;
            height: 450px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--shadow);
            border-radius: 15px;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Front Side Styles */
        .card-front {
            background-color: var(--card-front-bg);
            border: 1px solid #eee;
        }

        .image-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-size: 400% 400%; /* Important for 4x4 Grid */
            background-repeat: no-repeat;
        }

        .content-box {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .word-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .word-main {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .speak-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--accent-color);
            transition: transform 0.2s;
        }

        .speak-btn:hover {
            transform: scale(1.2);
        }

        .phonetic {
            font-size: 1.1rem;
            color: #666;
            font-style: italic;
        }

        /* Back Side Styles */
        .card-back {
            background-color: var(--card-back-bg);
            color: var(--text-light);
            transform: rotateY(180deg);
            padding: 30px;
            justify-content: flex-start;
            text-align: left;
        }

        .back-word {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .back-pos {
            font-size: 1rem;
            font-style: italic;
            opacity: 0.8;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .back-meaning {
            font-size: 1.8rem;
            margin-bottom: 25px;
        }

        .strategy-box {
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .mnemonic-label {
            font-weight: bold;
            color: var(--accent-color);
            display: block;
            margin-bottom: 8px;
        }

        .mnemonic-content {
            font-size: 1.3rem;
            background-color: rgba(0, 210, 255, 0.15);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            line-height: 1.5;
        }

        footer {
            margin-top: 50px;
            color: #999;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>🧠 高頻單字 U24 記憶卡</h1>
    </header>

    <div class="grid-container" id="vocabGrid">
        <!-- Cards will be injected by JavaScript -->
    </div>

    <footer>
        &copy; 2024 極簡科技單字記憶系統 - 視覺與語音整合工程
    </footer>

    <script>
        const vocabularyData = [
            { en: "advertise", ph: "/ˈædvərˌtaɪz/", cn: "廣告", grid: 1, pos: 0, strategy: "諧音", mnemonic: "阿德愛賣紙，到處貼紙打廣告。", pos_type: "vt./vi." },
            { en: "politician", ph: "/ˌpɑːləˈtɪʃən/", cn: "政治人物", grid: 1, pos: 1, strategy: "諧音", mnemonic: "政客像站在玻璃梯上的仙人。", pos_type: "n." },
            { en: "exhibit", ph: "/ɪɡˈzɪbɪt/", cn: "展覽；展示", grid: 1, pos: 2, strategy: "諧音", mnemonic: "這件愛可惜的西瓜皮正在被展覽。", pos_type: "vt./n." },
            { en: "restrict", ph: "/rɪˈstrɪkt/", cn: "限制", grid: 1, pos: 3, strategy: "諧音", mnemonic: "大力士被綑綁，行動受到限制。", pos_type: "vt." },
            { en: "determine", ph: "/dɪˈtɜːrmɪn/", cn: "決定", grid: 1, pos: 4, strategy: "諧音", mnemonic: "弟弟特別聰明，自己決定未來。", pos_type: "vt." },
            { en: "impress", ph: "/ɪmˈpres/", cn: "留下印象", grid: 1, pos: 5, strategy: "諧音", mnemonic: "硬要壓下鋼印，留下深刻印象。", pos_type: "vt." },
            { en: "impression", ph: "/ɪmˈpreʃən/", cn: "印象", grid: 1, pos: 6, strategy: "諧音", mnemonic: "巨大的印章蓋在腦袋上，印象超深刻。", pos_type: "n." },
            { en: "permit", ph: "/pərˈmɪt/", cn: "許可", grid: 1, pos: 7, strategy: "諧音", mnemonic: "婆婆秘密地批准了我的許可證。", pos_type: "vt./n." },
            { en: "quote", ph: "/kwoʊt/", cn: "引用", grid: 1, pos: 8, strategy: "諧音", mnemonic: "引用名言要先叩它門。", pos_type: "vt./n." },
            { en: "reveal", ph: "/rɪ\ˈviːl/", cn: "顯露；揭露", grid: 1, pos: 9, strategy: "字根", mnemonic: "揭開面紗 (veil)，真相終於顯露。", pos_type: "vt." },
            { en: "strength", ph: "/streŋθ/", cn: "力氣", grid: 1, pos: 10, strategy: "諧音", mnemonic: "死命把自己練壯，才有力氣。", pos_type: "n." },
            { en: "surround", ph: "/səˈraʊnd/", cn: "圍繞", grid: 1, pos: 11, strategy: "諧音", mnemonic: "蛇和龍互相圍繞。", pos_type: "vt." },
            { en: "surroundings", ph: "/səˈraʊndɪŋz/", cn: "環境", grid: 1, pos: 12, strategy: "諧音", mnemonic: "蛇和龍在園丁照顧的環境裡。", pos_type: "n. [pl.]" },
            { en: "significant", ph: "/sɪɡˈnɪfɪkənt/", cn: "重要的", grid: 1, pos: 13, strategy: "字形", mnemonic: "那隻螞蟻(ant)拿著「重要！」告示牌(sign)。", pos_type: "adj." },
            { en: "hint", ph: "/hɪnt/", cn: "暗示", grid: 1, pos: 14, strategy: "諧音", mnemonic: "他暗示你很恨它。", pos_type: "n./vt." },
            { en: "dairy", ph: "/ˈderi/", cn: "酪農場", grid: 1, pos: 15, strategy: "諧音", mnemonic: "爹哩(爹地)在酪農場擠牛奶。", pos_type: "n." },
            { en: "dizzy", ph: "/ˈdɪzi/", cn: "昏眩的", grid: 2, pos: 0, strategy: "諧音", mnemonic: "身體底子不好，容易感到昏眩。", pos_type: "adj." },
            { en: "remote", ph: "/rɪˈmoʊt/", cn: "遙遠的", grid: 2, pos: 1, strategy: "諧音", mnemonic: "被雷劈中的木頭，在很遙遠的地方。", pos_type: "adj." },
            { en: "hollow", ph: "/ˈhɑːloʊ/", cn: "空的", grid: 2, pos: 2, strategy: "諧音", mnemonic: "對著挖空的山洞喊「哈囉」，有回音。", pos_type: "adj." },
            { en: "misery", ph: "/ˈmɪzəri/", cn: "痛苦", grid: 2, pos: 3, strategy: "諧音", mnemonic: "比賽沒勝利還拿最後一名，心裡很痛苦。", pos_type: "n." },
            { en: "element", ph: "/ˈelɪmənt/", cn: "元素", grid: 2, pos: 4, strategy: "諧音", mnemonic: "愛麗絲推開大門，發現全是化學元素。", pos_type: "n." },
            { en: "elevator", ph: "/ˈelɪveɪtər/", cn: "電梯", grid: 2, pos: 5, strategy: "諧音", mnemonic: "電梯升降太快，愛勒住胃想吐。", pos_type: "n." },
            { en: "muscle", ph: "/ˈmʌsl/", cn: "肌肉", grid: 2, pos: 6, strategy: "諧音", mnemonic: "馬在路邊搜索肌肉男。", pos_type: "n." },
            { en: "mystery", ph: "/ˈmɪstəri/", cn: "神祕事件", grid: 2, pos: 7, strategy: "諧音", mnemonic: "密室理發生的案子，真是個神祕事件。", pos_type: "n." },
            { en: "crew", ph: "/kruː/", cn: "全體船員", grid: 2, pos: 8, strategy: "諧音", mnemonic: "這群船員在海上走過漫長的苦路。", pos_type: "n. [C]" },
            { en: "fuel", ph: "/ˈfjuːəl/", cn: "燃料", grid: 2, pos: 9, strategy: "諧音", mnemonic: "大聲呼叫：快給我加油(燃料)！", pos_type: "n./vt." },
            { en: "lung", ph: "/lʌŋ/", cn: "肺", grid: 2, pos: 10, strategy: "諧音", mnemonic: "龍的肺活量非常驚人。", pos_type: "n." },
            { en: "election", ph: "/ɪˈlekʃən/", cn: "選舉", grid: 2, pos: 11, strategy: "諧音", mnemonic: "民眾都愛來選舉投票。", pos_type: "n." },
            { en: "export", ph: "/ˈekspɔːrt/", cn: "出口", grid: 2, pos: 12, strategy: "字根", mnemonic: "貨物從港口(port)運出去(ex)就是出口。", pos_type: "vt./n." },
            { en: "arrest", ph: "/əˈrest/", cn: "逮捕", grid: 2, pos: 13, strategy: "諧音", mnemonic: "阿瑞被逮捕時心想：這下死定了。", pos_type: "vt./n." },
            { en: "polar", ph: "/ˈpoʊlər/", cn: "極地的", grid: 2, pos: 14, strategy: "聯想", mnemonic: "極地的冰都破了，北極熊好傷心。", pos_type: "adj." },
            { en: "violent", ph: "/ˈvaɪələnt/", cn: "猛烈的", grid: 2, pos: 15, strategy: "諧音", mnemonic: "猛烈的土石流，往外流出一堆泥。", pos_type: "adj." }
        ];

        const imgUrls = {
            1: "https://raw.githubusercontent.com/terenceylhc/ltvoc/main/%E9%AB%98%E9%A0%BBU24g1.jpg",
            2: "https://raw.githubusercontent.com/terenceylhc/ltvoc/main/%E9%AB%98%E9%A0%BBU24g2.jpg"
        };

        function calculatePosition(pos) {
            const col = pos % 4;
            const row = Math.floor(pos / 4);
            // 4x4 Grid offsets: 0, 33.333%, 66.666%, 100%
            const x = (col / 3) * 100;
            const y = (row / 3) * 100;
            return `${x}% ${y}%`;
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'en-US';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createCard(data) {
            const bgPos = calculatePosition(data.pos);
            const imgUrl = imgUrls[data.grid];

            const card = document.createElement('div');
            card.className = 'card-container';
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">
                        <div class="image-box" style="background-image: url('${imgUrl}'); background-position: ${bgPos};"></div>
                        <div class="content-box">
                            <div class="word-row">
                                <span class="word-main">${data.en}</span>
                                <button class="speak-btn" onclick="event.stopPropagation(); speak('${data.en}')">🔊</button>
                            </div>
                            <span class="phonetic">${data.ph}</span>
                        </div>
                    </div>
                    <div class="card-back">
                        <div class="back-word">${data.en}</div>
                        <div class="back-pos">${data.pos_type}</div>
                        <div class="back-meaning">${data.cn}</div>
                        <div class="strategy-box">💡 策略：${data.strategy}</div>
                        <div class="mnemonic-label">記憶口訣：</div>
                        <div class="mnemonic-content">${data.mnemonic}</div>
                    </div>
                </div>
            `;

            card.addEventListener('click', () => {
                const willFlipToBack = !card.classList.contains('is-flipped');
                card.classList.toggle('is-flipped');
                
                if (willFlipToBack) {
                    // Auto play pronunciation when flipping to back
                    setTimeout(() => speak(data.en), 300);
                }
            });

            return card;
        }

        function init() {
            const grid = document.getElementById('vocabGrid');
            const shuffledData = shuffle([...vocabularyData]);
            
            shuffledData.forEach(item => {
                grid.appendChild(createCard(item));
            });
        }

        window.onload = init;
    </script>
</body>
</html>
